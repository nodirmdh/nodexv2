services:
  - type: web
    name: nodex-api
    runtime: node
    plan: free
    rootDir: .
    healthCheckPath: /health
    buildCommand: npm install --include=dev && npm -w apps/api run prisma:generate && npm -w apps/api exec prisma db push
    startCommand: npm -w apps/api exec tsx src/dev.ts
    autoDeploy: true
    envVars:
      - key: NODE_ENV
        value: production
      - key: DEV_MODE
        value: "false"
      - key: PORT
        value: "10000"
      - key: HOST
        value: "0.0.0.0"
      - key: DATABASE_URL
        sync: false
      - key: ADMIN_USERNAME
        sync: false
      - key: ADMIN_PASSWORD
        sync: false
      - key: JWT_SECRET
        sync: false

  - type: web
    name: nodex-bot-client
    runtime: node
    plan: free
    rootDir: .
    healthCheckPath: /health
    buildCommand: npm install --include=dev
    startCommand: npm -w apps/telegram-bot run start:client
    autoDeploy: true
    envVars:
      - key: NODE_ENV
        value: production
      - key: TELEGRAM_CLIENT_BOT_TOKEN
        sync: false
      - key: TELEGRAM_VENDOR_BOT_TOKEN
        sync: false
      - key: TELEGRAM_CLIENT_WEBAPP_URL
        sync: false
      - key: TELEGRAM_VENDOR_WEBAPP_URL
        sync: false
      - key: TELEGRAM_ADMIN_URL
        sync: false
      - key: TELEGRAM_SYNC_API_URL
        value: https://nodex-api-0ksq.onrender.com
      - key: TELEGRAM_INITDATA_MAX_AGE_SEC
        value: "86400"
      - key: VITE_API_URL
        sync: false
      - key: DEV_MODE
        value: "false"

  - type: web
    name: nodex-bot-vendor
    runtime: node
    plan: free
    rootDir: .
    healthCheckPath: /health
    buildCommand: npm install --include=dev
    startCommand: npm -w apps/telegram-bot run start:vendor
    autoDeploy: true
    envVars:
      - key: NODE_ENV
        value: production
      - key: TELEGRAM_CLIENT_BOT_TOKEN
        sync: false
      - key: TELEGRAM_VENDOR_BOT_TOKEN
        sync: false
      - key: TELEGRAM_CLIENT_WEBAPP_URL
        sync: false
      - key: TELEGRAM_VENDOR_WEBAPP_URL
        sync: false
      - key: TELEGRAM_ADMIN_URL
        sync: false
      - key: TELEGRAM_SYNC_API_URL
        value: https://nodex-api-0ksq.onrender.com
      - key: TELEGRAM_INITDATA_MAX_AGE_SEC
        value: "86400"
      - key: VITE_API_URL
        sync: false
      - key: DEV_MODE
        value: "false"
